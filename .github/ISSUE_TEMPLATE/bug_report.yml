name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: profile
    attributes:
      label: Hardware Profile
      options:
        - cpu
        - gpu
        - dual
        - minimal
        - bare metal (no Docker)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run `make logs` or `docker compose logs <service>`
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Docker version:
        - CPU:
        - RAM:
        - GPU (if applicable):
