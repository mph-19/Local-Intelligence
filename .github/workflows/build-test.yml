name: Build Test

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'services/**'
      - 'scripts/**'
      - 'docker-compose.yml'
  workflow_dispatch:  # manual trigger

jobs:
  build-orchestrator:
    name: Build orchestrator image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build orchestrator
        run: |
          docker buildx build \
            --file docker/Dockerfile.orchestrator \
            --target orchestrator \
            --load \
            -t local-intelligence-orchestrator:test .
      - name: Verify orchestrator starts
        run: |
          docker run -d --name orch-test \
            -e QDRANT_PATH=/tmp/qdrant \
            -e LLM_URL=http://localhost:8080/v1/chat/completions \
            -p 8081:8081 \
            local-intelligence-orchestrator:test
          sleep 15
          curl -sf http://localhost:8081/v1/models || (docker logs orch-test && exit 1)
          docker stop orch-test

  build-falcon3:
    name: Build falcon3 image (compile only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Test falcon3 compilation
        # Only test that bitnet.cpp compiles — skip model download (too large for CI)
        run: |
          docker buildx build \
            --file docker/Dockerfile.falcon3 \
            --target builder \
            -t falcon3-builder:test .

  lint-python:
    name: Lint Python code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install and run basic checks
        run: |
          pip install -r docker/requirements.orchestrator.txt
          python -c "import services.orchestrator" 2>/dev/null || \
          python -c "
          import ast, sys
          for f in ['services/orchestrator.py', 'services/rag.py', 'scripts/ingest_docs.py', 'scripts/ingest_kiwix.py']:
              try:
                  ast.parse(open(f).read())
                  print(f'  [OK] {f}')
              except SyntaxError as e:
                  print(f'  [FAIL] {f}: {e}')
                  sys.exit(1)
          "
