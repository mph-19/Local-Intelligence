# Local Intelligence — Docker Compose
#
# Profiles control which LLM services start:
#   cpu      Falcon3 10B only (CPU, default)
#   gpu      Qwen 3.5 9B only (NVIDIA GPU)
#   dual     Falcon3 triage (CPU) + Qwen synthesis (GPU)
#   minimal  Falcon3 3B (CPU, <8GB RAM machines)
#
# Set via COMPOSE_PROFILES in .env or: docker compose --profile dual up -d
#
# Usage:
#   make up                         # start with configured profile
#   make logs                       # watch all logs
#   make ingest-docs                # index your documents
#   make down                       # stop everything
#
# First run builds images (~5-15 min). Subsequent starts are instant.
#
# Network: ports bind to 127.0.0.1 (localhost only) by default.
# To expose on the LAN: set BIND_ADDR=0.0.0.0 in .env
#
# Requirements:
#   - Copy .env.example to .env and run: make setup (or edit manually)
#   - cpu/minimal: 8-12 GB RAM
#   - gpu: NVIDIA GPU with 8+ GB VRAM, nvidia-container-toolkit
#   - dual: both of the above

services:

  # ── Falcon3 — CPU inference (bitnet.cpp) ───────────────────────
  # Used as sole LLM in "cpu" profile, or as fast triage in "dual".
  falcon3:
    build:
      context: .
      dockerfile: docker/Dockerfile.falcon3
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${LLM_PORT:-8080}:8080"
    environment:
      - CTX_SIZE=${FALCON_CTX_SIZE:-32768}
      - THREADS=${THREADS:-0}
    profiles: ["cpu", "dual"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${FALCON_MEM_LIMIT:-12g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Falcon3 3B — lightweight CPU inference for low-RAM machines ─
  falcon3-mini:
    build:
      context: .
      dockerfile: docker/Dockerfile.falcon3
      args:
        MODEL_REPO: tiiuae/Falcon3-3B-Instruct-1.58bit
        GGUF_REPO: tiiuae/Falcon3-3B-Instruct-1.58bit-GGUF
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${LLM_PORT:-8080}:8080"
    environment:
      - CTX_SIZE=${FALCON_CTX_SIZE:-8192}
      - THREADS=${THREADS:-0}
    profiles: ["minimal"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Qwen 3.5 9B — GPU inference (llama.cpp + CUDA) ────────────
  # Used as sole LLM in "gpu" profile, or as synthesizer in "dual".
  qwen:
    build:
      context: .
      dockerfile: docker/Dockerfile.qwen
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${SYNTH_PORT:-8082}:8082"
    environment:
      - CTX_SIZE=${QWEN_CTX_SIZE:-8192}
      - GPU_LAYERS=${QWEN_GPU_LAYERS:-99}
    profiles: ["gpu", "dual"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s    # model load + CUDA init

  # ── Orchestrator — RAG-augmented proxy ──────────────────────────
  # Adapts to available LLMs via PIPELINE_MODE env var.
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
      target: orchestrator
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${ORCHESTRATOR_PORT:-8081}:8081"
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - ${KNOWLEDGE_DIR:-./data/knowledge}:/knowledge
    environment:
      - PIPELINE_MODE=${PIPELINE_MODE:-single}
      - LLM_URL=${LLM_URL:-http://falcon3:8080/v1/chat/completions}
      - TRIAGE_LLM_URL=${TRIAGE_LLM_URL:-}
      - SYNTH_LLM_URL=${SYNTH_LLM_URL:-}
      - KIWIX_URL=http://kiwix:8888
      - ORCHESTRATOR_PORT=8081
      - QDRANT_PATH=/knowledge/vectors/qdrant
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      falcon3:
        condition: service_healthy
        required: false
      falcon3-mini:
        condition: service_healthy
        required: false
      qwen:
        condition: service_healthy
        required: false
      kiwix:
        condition: service_started
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s    # nomic model loads on first start

  # ── Kiwix — offline knowledge bases ─────────────────────────────
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.8.2@sha256:acdab28186a66b51bfd4202210c6732931ea95cf41c711148a0c9770b9fcc9e1
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${KIWIX_PORT:-8888}:8888"
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - ${KNOWLEDGE_DIR:-./data/knowledge}:/knowledge
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Auto-generate library XML from any ZIM files present
        if [ ! -f /knowledge/kiwix-library.xml ] && ls /knowledge/zim/*.zim >/dev/null 2>&1; then
          echo "Auto-generating kiwix-library.xml..."
          for zim in /knowledge/zim/*.zim; do
            kiwix-manage /knowledge/kiwix-library.xml add "$$zim" 2>/dev/null || true
          done
        fi
        if [ -f /knowledge/kiwix-library.xml ]; then
          exec kiwix-serve --library /knowledge/kiwix-library.xml --port 8888 --nodatealias
        else
          echo "No ZIM files found in /knowledge/zim/ — Kiwix idle."
          echo "Add ZIM files to /knowledge/zim/ and Kiwix will start automatically."
          exit 0
        fi
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s    # time for kiwix-manage to build library XML

  # ── Open WebUI — chat interface ─────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.9@sha256:4320d38874dd6f43fc865209b1d5b1fae903055a7fa56de8c2493bf836f7920a
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${WEBUI_PORT:-3000}:8080"
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      - OPENAI_API_BASE_URL=http://orchestrator:8081/v1
      - OPENAI_API_KEY=local
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
    volumes:
      - webui-data:/app/backend/data
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  # ── Ingestion worker (run manually, not always-on) ──────────────
  ingest:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
      target: ingest
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - ${KNOWLEDGE_DIR:-./data/knowledge}:/knowledge
    environment:
      - QDRANT_PATH=/knowledge/vectors/qdrant
      - KIWIX_URL=http://kiwix:8888
    depends_on:
      kiwix:
        condition: service_healthy
        required: false
    profiles:
      - tools

volumes:
  webui-data:
